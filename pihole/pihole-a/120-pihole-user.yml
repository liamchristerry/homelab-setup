#cloud-config
hostname: pihole-a
manage_etc_hosts: true
fqdn: pihole-a.home.lab
ssh_pwauth: true
  
users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFBaA+DrpzzvqoaEvLaEbVJJ5R2JW+40UWF7ekPwE6+N

package_upgrade: true
packages:
  - qemu-guest-agent
  - curl
  #- ca-certificates
  #- git

write_files:
  - path: /etc/pihole/setupVars.conf
    content: |
      PIHOLE_INTERFACE=eth0
      PIHOLE_DNS_1=1.1.1.1
      PIHOLE_DNS_2=1.0.0.1
      QUERY_LOGGING=true
      INSTALL_WEB_SERVER=true
      INSTALL_WEB_INTERFACE=true
      LIGHTTPD_ENABLED=true
      BLOCKING_ENABLED=true
      DNSMASQ_LISTENING=all
    permissions: '0644'


runcmd:
  - sudo systemctl disable systemd-resolved
  - sudo systemctl stop systemd-resolved
  - sudo rm /etc/resolv.conf
  - echo -e "nameserver 127.0.0.1\nnameserver 1.1.1.1" | sudo tee /etc/resolv.conf
  # Disabling systemd-resolved and tellign the server to use 1.1.1.1 and localhost for dns. localhost will not work until pihole is installed
  # removing the symlink /etc/resolv.conf to ../run/systemd/resolve/stub-resolv.conf

  - curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended

  - systemctl enable pihole-FTL
  # Should not be really needed but doing it just to make sure the service is enabled
  
  - pihole -g
  # Updates gravity block lists

  - sudo rm /etc/resolv.conf
  - echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf

  - systemctl enable --now qemu-guest-agent
  - echo "cloud-init base setup complete" >> /home/ansible/cloudinit.log
