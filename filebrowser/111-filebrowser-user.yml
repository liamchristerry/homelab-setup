#cloud-config
hostname: filebrowser
manage_etc_hosts: true
fqdn: filebrowser.home.lab
ssh_pwauth: true

users:
  - name: ansible
    lock_passwd: false # Makes sure the user is not locked 
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFBaA+DrpzzvqoaEvLaEbVJJ5R2JW+40UWF7ekPwE6+N

package_upgrade: true
packages:
  - qemu-guest-agent
  - nfs-common

write_files:
  - path: /etc/filebrowser/filebrowser.json
    defer: true #needing this due to the order that writefiles is ran. Runs before users are crated
    owner: ansible:ansible
    permissions: '0644'
    content: |
      {
        "port": 8080,
        "baseURL": "",
        "address": "0.0.0.0",
        "log": "stdout",
        "database": "/etc/filebrowser/filebrowser.db",
        "root": "/mnt/nfs-share/",
        "signup": false,
        "createUserDir": false,
        "username": "liam",
        "password": "$2a$10$fPrjg7COXVUPD90Gx4Oxke8cJic63UMfW0whppnCWh7w9C6c29tVW"
      }
# Hash created with filebrower hash <password> 

  - path: /etc/systemd/system/filebrowser.service
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=File Browser
      After=network.target
      [Service]
      ExecStart=/usr/local/bin/filebrowser -c /etc/filebrowser/filebrowser.json
      [Install]
      WantedBy=multi-user.target

  - path: /tmp/50unattended-upgrades
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        Unattended-Upgrade::Allowed-Origins {
        // Base Ubuntu release packages - as shipped on install day, rarely changes
        "${distro_id}:${distro_codename}";

        // Security patches only - CVEs and critical fixes, low risk, fast turnaround
        "${distro_id}:${distro_codename}-security";

        // Stable bug fixes and broader updates - tested before release, still low risk
        // Remove this line if you want security-only updates
        "${distro_id}:${distro_codename}-updates";

        };
        // NOTE: Only packages from Ubuntu's official repos are updated with this config.
        // Third-party repos (Docker, Hashicorp, PPAs etc) are never touched - update manually
        // or via a separate weekly apt upgrade cron job.
        // noble-backports and noble-proposed are intentionally excluded - too risky for auto-update

        // Sends logs to syslog /var/log/syslog
        Unattended-Upgrade::SyslogEnable "true";
        Unattended-Upgrade::SyslogFacility "daemon";

        // Auto reboot 3am if users are logged in or not
        Unattended-Upgrade::Automatic-Reboot "true";
        Unattended-Upgrade::Automatic-Reboot-Time "03:00";

        // Cleanup
        Unattended-Upgrade::Remove-Unused-Dependencies "true";
        Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
        Unattended-Upgrade::LogRotate "6";

        Unattended-Upgrade::Package-Blacklist {
        };
        // Normal Unattended Update logs /var/log/unattended-upgrades/

  - path: /tmp/20auto-upgrades
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        APT::Periodic::Update-Package-Lists "1";
        APT::Periodic::Unattended-Upgrade "1";
        APT::Periodic::AutocleanInterval "7";
        
 # MOTD - shows on every SSH login
  - path: /etc/update-motd.d/99-nginx
    owner: root:root
    permissions: '0755'
    defer: true
    content: |
      echo "#########################################"
      echo "#     Update Nginx Reverse Proxy        #
      echo "#     Remove this Message After         #
      echo "#  sudo rm /etc/update-motd.d/99-nginx  #
      echo "#########################################"
      
mounts:
  - [ "192.168.99.200:/volume1/media", "/mnt/nfs-share", "nfs", "defaults,_netdev,hard,intr", "0", "0" ]


runcmd:
  # Create necessary directories
  - mkdir -p /mnt/nfs-share
  - chown -R ansible:ansible /var/lib/filebrowser

  # Mount NFS share
  - mount /mnt/nfs-share || true

  # Set permissions on mount point
  - chown ansible:ansible /mnt/nfs-share
  - chmod 755 /mnt/nfs-share

   # Install FileBrowser
  - curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash

  # Enable and start services
  - systemctl daemon-reload
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - systemctl enable filebrowser.service
  - systemctl start filebrowser.service
  
  - echo "cloud-init setup complete" >> /home/ansible/cloudinit.log
