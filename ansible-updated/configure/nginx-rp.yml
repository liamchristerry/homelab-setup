---
- name: Configure Nginx Reverse Proxy
  hosts: nginx
  become: yes
  
  tasks:
    - name: Apply base LXC configuration
      include_tasks: ../tasks/base-lxc-config.yml
    
    - name: Install nginx and certbot
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-dns-route53
        state: present
    
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
    
    - name: Deploy reverse proxy configuration
      template:
        src: ../templates/reverse-proxy.conf.j2
        dest: /etc/nginx/conf.d/reverse-proxy.conf
        mode: '0644'
      notify: Reload nginx
    
    - name: Test nginx configuration
      command: nginx -t
      changed_when: false
    
    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes
  
  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded