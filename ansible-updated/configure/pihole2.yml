---
- name: Configure Pi-hole DNS Server
  hosts: pihole
  become: yes
  
  vars:
    pihole_dns_1: "1.1.1.1"
    pihole_dns_2: "1.0.0.1"
  
  tasks:
    - name: Apply base LXC configuration
      include_tasks: ../tasks/base-lxc-config.yml
    
    - name: Install Pi-hole prerequisites
      apt:
        name:
          - curl
          - ca-certificates
          - git
        state: present
    
    - name: Create Pi-hole directory
      file:
        path: /etc/pihole
        state: directory
        mode: '0755'
    
    - name: Create Pi-hole setup variables
      copy:
        dest: /etc/pihole/setupVars.conf
        content: |
          WEBPASSWORD={{ pihole_web_password }}
          PIHOLE_INTERFACE=eth0
          IPV4_ADDRESS={{ services.pihole.ip }}/{{ network_subnet }}
          IPV6_ADDRESS=
          PIHOLE_DNS_1={{ pihole_dns_1 }}
          PIHOLE_DNS_2={{ pihole_dns_2 }}
          QUERY_LOGGING=true
          INSTALL_WEB_SERVER=true
          INSTALL_WEB_INTERFACE=true
          LIGHTTPD_ENABLED=true
          BLOCKING_ENABLED=true
        mode: '0644'
    
    - name: Install Pi-hole
      shell: curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended
      args:
        creates: /usr/local/bin/pihole
    
    - name: Update gravity (blocklists)
      command: pihole -g
      changed_when: false