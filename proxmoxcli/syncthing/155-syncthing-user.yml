#cloud-config
hostname: syncthing
manage_etc_hosts: true
fqdn: syncthing.home.lab
ssh_pwauth: true
  
users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFBaA+DrpzzvqoaEvLaEbVJJ5R2JW+40UWF7ekPwE6+N
 
  - name: syncthing 
    shell: /bin/bash
    lock_passwd: true

package_upgrade: true
packages:
  - qemu-guest-agent
  - curl
  - nfs-common

write_files:
  - path: /etc/systemd/system/syncthing.service
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        [Unit]
        Description=Syncthing
        [Service]
        Type=simple
        ExecStart=/usr/bin/syncthing
        User=syncthing
        [Install]
        WantedBy=multi-user.target

  - path: /usr/local/bin/backup-syncthing-config
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        #!/bin/bash
        TIMESTAMP=$(date +%Y%m%d)
        CONFIG_DIR="/home/syncthing/.local"
        BACKUP_DIR="/mnt/nas/backups/syncthing_config"

        systemctl stop syncthing.service
        sleep 2
        # Backup config 
        tar -czvf "$BACKUP_DIR/syncthing_config-$TIMESTAMP.tar.gz" -C "$CONFIG_DIR" .

        # Check if backup succeeded
        if [ $? -eq 0 ]; then

          #Remove files older than 30 days
          ls -t "$BACKUP_DIR"/syncthing-config-*.tar.gz | tail -n +31 | xargs rm -f 2>/dev/null

        systemctl start syncthing.service

  - path: /tmp/50unattended-upgrades
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}:${distro_codename}-updates";
        };
        // Updates OS and packages that are in main repo only with this configuration

        // Sends logs to syslog /var/log/syslog
        Unattended-Upgrade::SyslogEnable "true";
        Unattended-Upgrade::SyslogFacility "daemon";

        // Auto reboot 3am if users are logged in or not
        Unattended-Upgrade::Automatic-Reboot "true";
        Unattended-Upgrade::Automatic-Reboot-Time "03:00";

        // Cleanup
        Unattended-Upgrade::Remove-Unused-Dependencies "true";
        Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
        Unattended-Upgrade::LogRotate "6";

        // Normal Unattended Update logs /var/log/unattended-upgrades/

  - path: /tmp/20auto-upgrades
    defer: true
    owner: root:root
    permissions: '0644'
    content: |
        APT::Periodic::Update-Package-Lists "1";
        APT::Periodic::Unattended-Upgrade "1";
        APT::Periodic::AutocleanInterval "7";


  # MOTD - shows on every SSH login
  - path: /etc/update-motd.d/99-nag
    owner: root:root
    permissions: '0755'
    defer: true
    content: |
      echo "#########################################"
      echo "#     Create DNS record on PIHoles      #
      echo "#     Enable versions on folders        #
      echo "#     Remove this Message After         #
      echo "#  sudo rm /etc/update-motd.d/99-nag  #
      echo "#########################################"
      


mounts:
  - [ "192.168.99.200:/volume1/media", "/mnt/nas", "nfs", "defaults,_netdev,hard,intr", "0", "0" ]

runcmd:
#install syncthing
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://syncthing.net/release-key.gpg -o /etc/apt/keyrings/syncthing-archive-keyring.gpg
  - echo "deb [signed-by=/etc/apt/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable" > /etc/apt/sources.list.d/syncthing.list
  - apt update
  - apt install -y syncthing

  - mount /mnt/nas || true

#enable and start syncthing (service file is created with writefiles module above)
  - systemctl enable syncthing.service
  - systemctl start syncthing.service

#adding the sleep to give syncthing some time to start 
  - sleep 10

#add base configuration of syncthing, include binding to all IPs for management and create folders
  - syncthing cli --home=/home/syncthing/.local/state/syncthing/ config gui raw-address set 0.0.0.0:8384
  - deviceid=$(syncthing cli --home=/home/syncthing/.local/state/syncthing/ config devices list)
  - syncthing cli --home=/home/syncthing/.local/state/syncthing/ config devices $deviceid name set "Syncthing Server"
  - syncthing cli --home=/home/syncthing/.local/state/syncthing/ config folders add --id retroarch-saves --label "retroarch-saves" --path /mnt/nas/GameSaves/retroarch-saves
  - syncthing cli --home=/home/syncthing/.local/state/syncthing/ config folders add --id retroarch-states --label "retroarch-states" --path /mnt/nas/GameSaves/retroarch-states

#Create backup job for syncthing
  - chmod +x /usr/local/bin/backup-syncthing-config
  - echo "0 2 * * * root /usr/local/bin/backup-syncthing-config" > /etc/cron.d/syncthing-backup

#Editing Unattended Upgrades. Sets auto reboots if needed, updates and security.
  - mv /etc/apt/apt.conf.d/20auto-upgrades /etc/apt/apt.conf.d/20auto-upgrades.orig
  - mv /etc/apt/apt.conf.d/50unattended-upgrades /etc/apt/apt.conf.d/50unattended-upgrades.orig
  - mv /tmp/20auto-upgrades /etc/apt/apt.conf.d/20auto-upgrades
  - mv /tmp/50unattended-upgrades /etc/apt/apt.conf.d/50unattended-upgrades


#Create cron to upgrade other apps weekly (Sunday 4 AM)
#Uses Logger to log to /var/log/syslog
  - echo "0 4 * * 0  apt update && apt upgrade -y 2>&1 | logger -t apt-weekly-upgrade" > /etc/cron.d/aptupdate-upgrade

  - systemctl enable --now qemu-guest-agent
  - echo "cloud-init base setup complete" >> /home/ansible/cloudinit.log


