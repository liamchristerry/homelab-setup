#cloud-config
hostname: openspeedtest
manage_etc_hosts: true
fqdn: openspeedtest.home.lab
ssh_pwauth: true
  
users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFBaA+DrpzzvqoaEvLaEbVJJ5R2JW+40UWF7ekPwE6+N

packages:
  - qemu-guest-agent
  - curl
  - ca-certificatesss
  - docker.io
  - docker-compose

runcmd:
  # Enable Docker service
  - systemctl enable --now docker
  
  # Create directory for docker-compose
  - mkdir -p /opt/openspeedtest
  
  # Create docker-compose file
  - |
    cat > /opt/openspeedtest/docker-compose.yml <<'EOF'
    version: '3'
    services:
      openspeedtest:
        image: openspeedtest/latest
        container_name: openspeedtest
        ports:
          - "3000:3000"
          - "3001:3001"
        restart: unless-stopped
        environment:
          - TZ=America/New_York
    EOF
  
  # Start OpenSpeedTest
  - cd /opt/openspeedtest && docker-compose up -d
  
  # Enable guest agent
  - systemctl enable --now qemu-guest-agent
  
  # Log completion
  - echo "OpenSpeedTest running at http://$(hostname -I | awk '{print $1}'):3000" >> /home/ansible/install.log