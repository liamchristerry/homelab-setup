---
- name: Health check all services
  hosts: lxc_containers
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Check disk usage
      shell: df -h / | awk 'NR==2 {print $5}' | sed 's/%//'
      register: disk_usage
      changed_when: false
    
    - name: Alert if disk > 80%
      debug:
        msg: "⚠️  WARNING: {{ inventory_hostname }} disk usage at {{ disk_usage.stdout }}%"
      when: disk_usage.stdout | int > 80
    
    - name: Check memory usage
      shell: free | awk 'NR==2 {printf "%.0f", $3/$2 * 100}'
      register: mem_usage
      changed_when: false
    
    - name: Alert if memory > 90%
      debug:
        msg: "⚠️  WARNING: {{ inventory_hostname }} memory usage at {{ mem_usage.stdout }}%"
      when: mem_usage.stdout | int > 90
    
    - name: Check if services are running
      service_facts:
    
    - name: Report nginx status
      debug:
        msg: "✓ Nginx is running"
      when: 
        - "'nginx' in inventory_hostname"
        - ansible_facts.services['nginx.service'].state == 'running'
    
    - name: Report pihole status
      debug:
        msg: "✓ Pi-hole is running"
      when:
        - "'pihole' in inventory_hostname"
        - ansible_facts.services['pihole-FTL.service'].state == 'running'
      failed_when: false
    
    - name: Report authelia status
      debug:
        msg: "✓ Authelia is running"
      when:
        - "'authelia' in inventory_hostname"
        - ansible_facts.services['authelia.service'].state == 'running'
    
    - name: Display system summary
      debug:
        msg: |
          📊 {{ inventory_hostname }} Status:
          - Disk: {{ disk_usage.stdout }}%
          - Memory: {{ mem_usage.stdout }}%
          - Uptime: {{ ansible_uptime_seconds | int // 86400 }} days
