---
# Update all LXC containers from Proxmox host
- name: Update all LXC containers
  hosts: proxmox
  become: yes
  
  tasks:
    - name: Get list of running containers
      shell: "pct list | awk 'NR>1 && $2==\"running\" {print $1}'"
      register: running_containers
      changed_when: false
    
    - name: Update each running container
      command: "pct exec {{ item }} -- bash -c 'apt update && apt upgrade -y && apt autoremove -y'"
      loop: "{{ running_containers.stdout_lines }}"
      register: lxc_updates
      changed_when: "'0 upgraded' not in lxc_updates.stdout"
    
    - name: Check for containers needing reboot
      command: "pct exec {{ item }} -- test -f /var/run/reboot-required"
      loop: "{{ running_containers.stdout_lines }}"
      register: reboot_check
      failed_when: false
      changed_when: reboot_check.rc == 0
    
    - name: Display containers needing reboot
      debug:
        msg: "Container {{ item.item }} needs reboot"
      loop: "{{ reboot_check.results }}"
      when: item.rc == 0
