---
- name: Backup critical configurations
  hosts: lxc_containers
  become: yes
  
  vars:
    backup_date: "{{ ansible_date_time.date }}"
    backup_dest: "/tmp/backups"
  
  tasks:
    - name: Create local backup directory
      file:
        path: "{{ backup_dest }}"
        state: directory
      delegate_to: localhost
      run_once: true
    
    - name: Backup /etc directory
      archive:
        path: /etc
        dest: "/tmp/{{ inventory_hostname }}-etc-{{ backup_date }}.tar.gz"
    
    - name: Fetch backup to local machine
      fetch:
        src: "/tmp/{{ inventory_hostname }}-etc-{{ backup_date }}.tar.gz"
        dest: "{{ backup_dest }}/{{ inventory_hostname }}-etc-{{ backup_date }}.tar.gz"
        flat: yes
    
    - name: Remove remote backup file
      file:
        path: "/tmp/{{ inventory_hostname }}-etc-{{ backup_date }}.tar.gz"
        state: absent
    
    - name: Display backup location
      debug:
        msg: "Backup saved to {{ backup_dest }}/{{ inventory_hostname }}-etc-{{ backup_date }}.tar.gz"
      run_once: true
