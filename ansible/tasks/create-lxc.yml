---
## Check if container exists first
- name: Check if container {{ vmid }} exists
  shell: pct status {{ vmid }}
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"
  register: container_check
  failed_when: false # Expect this to fail if the LXC exists but want the play to continue
  changed_when: false # Not a change task

- name: Fail if container exists and recreate not set
  fail:
    msg: |
      Container {{ vmid }} ({{ hostname }}) already exists.
      Run with -e recreate=true to recreate it.
  when: 
    - container_check.rc == 0 # Need the return code to be 0 meaning it found the container 
    - not (recreate | default(false)) # This means only run if recreate is set to true. Otherwise default to false

## Recreate mode: Destroy existing
- name: Stop and destroy existing container (recreate mode)
  shell: |
    pct stop {{ vmid }} || true
    pct destroy {{ vmid }}
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"
  when: 
    - container_check.rc == 0
    - recreate | default(false) # Will only run if we tell the playbook to run with the recreate flag

## Download Template
- name: Download fresh template
  shell: |
    pveam remove {{ lxc_template }} || true
    pveam update
    pveam download local {{ lxc_template.split('/')[-1] }}
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"

## Upload SSH key
- name: Upload SSH public key to Proxmox
  copy:
    content: "{{ admin_ssh_public_key }}"
    dest: "/tmp/ansible_pubkey_{{ vmid }}.pub"
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"

## Create Container
- name: Create LXC container - {{ hostname }}
  shell: |
    pct create {{ vmid }} {{ lxc_template }} \
      --hostname {{ hostname }} \
      --cores {{ cores }} \
      --memory {{ memory }} \
      --swap {{ lxc_swap }} \
      --rootfs {{ lxc_storage }}:{{ disk }} \
      --net0 name=eth0,bridge=vmbr0,ip={{ ip }}/{{ subnet }},gw={{ gateway }} \
      --nameserver {{ nameserver }} \
      --password {{ lxc_root_password }} \
      --ssh-public-keys /tmp/ansible_pubkey_{{ vmid }}.pub \
      --unprivileged 1 \
      --onboot 1
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"

- name: Start container - {{ hostname }}
  shell: pct start {{ vmid }}
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"

- name: Clean up temp SSH key file
  file:
    path: "/tmp/ansible_pubkey_{{ vmid }}.pub"
    state: absent
  delegate_to: "{{ proxmox_node }}"
  vars:
    ansible_user: "{{ proxmox_ssh_user }}"
    ansible_ssh_private_key_file: "{{ proxmox_ssh_key }}"

- name: Wait for SSH - {{ hostname }}
  wait_for:
    host: "{{ ip }}"
    port: 22
    delay: 10
    timeout: 60

- name: Add to inventory
  add_host:
    name: "{{ hostname }}"
    ansible_host: "{{ ip }}"
    ansible_user: root
    groups: 
      - lxc_containers
      - "{{ hostname }}_group"