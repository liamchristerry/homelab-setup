---
# Reusable base LXC configuration
# Runs on the target container

- name: Set base configuration variables
  set_fact:
    base_packages:
      - vim
      - curl
      - wget
      - htop
      - net-tools
      - rsyslog
      - unattended-upgrades
    admin_ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBzcwi... your_key_here"
    graylog_server: "192.168.99.140"


- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install base packages
  apt:
    name: "{{ base_packages }}"
    state: present

- name: Set timezone
  timezone:
    name: America/Detroit

- name: Create admin user
  user:
    name: "{{ admin_username }}"  # stored in @secrets.yml
    password: "{{ admin_password_hash }}"  # stored in Secrets
    shell: /bin/bash
    groups: sudo
    append: yes
    state: present

- name: Create .ssh directory for admin user
  file:
    path: "/home/{{ admin_username }}/.ssh"
    state: directory
    owner: "{{ admin_username }}"
    group: "{{ admin_username }}"
    mode: '0700'

- name: Add SSH key for admin user
  authorized_key:
    user: "{{ admin_username }}"
    key: "{{ admin_ssh_key }}"  # stored in group_vars/all.yml
    state: present

- name: Configure unattended upgrades
  debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    value: 'true'
    vtype: boolean

- name: Configure rsyslog for Graylog
  blockinfile:
    path: /etc/rsyslog.d/60-graylog.conf
    create: yes
    block: |
      # Forward logs to Graylog
      *.* @@{{ graylog_server }}:514;RSYSLOG_SyslogProtocol23Format
  register: rsyslog_config

- name: Restart rsyslog if config changed
  service:
    name: rsyslog
    state: restarted
  when: rsyslog_config.changed

- name: Disable root SSH password login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
  register: sshd_config

- name: Restart sshd if config changed
  service:
    name: sshd
    state: restarted
  when: sshd_config.changed