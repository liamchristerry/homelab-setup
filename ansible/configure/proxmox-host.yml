---
- name: Configure Proxmox Post-Install
  hosts: proxmox
  become: yes
  gather_facts: yes

  vars:
    # VLAN configuration (applies to all hosts)
    bridge_interface: "vmbr0"
    bridge_vlans: "6,66,99"
    primary_interface: "eno1"

  tasks:
    - name: Display detected OS information
      ansible.builtin.debug:
        msg: "Detected {{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_distribution_release }})"

    - name: Disable Proxmox VE enterprise repository
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        regexp: '^(deb.*)$'
        replace: '# \1'
      when: ansible_facts['os_family'] == "Debian"

    - name: Disable Ceph enterprise repository (if exists)
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/ceph.list
        regexp: '^(deb.*)$'
        replace: '# \1'
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    - name: Add Proxmox VE no-subscription repository
      ansible.builtin.apt_repository:
        repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
        filename: pve-no-subscription
        state: present

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Backup existing network interfaces file
      ansible.builtin.copy:
        src: /etc/network/interfaces
        dest: /etc/network/interfaces.backup
        remote_src: yes
        force: no

    - name: Deploy network interfaces configuration with VLANs
      ansible.builtin.template:
        src: ../templates/proxmox-host-interfaces.j2
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        backup: yes
      notify: Reload network interfaces

    - name: Verify VLAN configuration
      ansible.builtin.shell: grep "bridge-vids" /etc/network/interfaces
      register: vlan_verification
      changed_when: false
      failed_when: false

    - name: Display VLAN configuration
      ansible.builtin.debug:
        msg: "{{ vlan_verification.stdout_lines }}"
      when: vlan_verification.rc == 0

  handlers:
    - name: Reload network interfaces
      ansible.builtin.shell: ifreload -a
      register: ifreload_result
      changed_when: ifreload_result.rc == 0
