---
- name: Create UniFi Network Manager LXC Container
  hosts: localhost
  gather_facts: no
  
  vars:
    proxmox_node: proxmox1.home.lab
    vmid: 115
    hostname: unifi
    ip: 192.168.99.115
    gateway: 192.168.99.1
    subnet: 24
    nameserver: 192.168.99.120
    cores: 2
    memory: 2048
    disk: 8
    lxc_swap: 512
    lxc_disk: "8"
    lxc_storage: "local-lvm"
    lxc_template: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
  
  tasks:
    - name: Create nginx LXC on Proxmox
      include_tasks: ../tasks/create-lxc.yml