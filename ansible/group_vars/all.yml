---


# LXC defaults
lxc_template: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"



# User management
admin_username: liam
admin_password_hash: "$6$rounds=656000$YourHashHere"  # Generate with: mkpasswd --method=sha-512
admin_ssh_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... your-key-here"

# Base packages
base_packages:
  - vim
  - curl
  - wget
  - htop
  - net-tools
  - rsyslog
  - unattended-upgrades

# Graylog settings
graylog_enabled: true
graylog_server: "192.168.99.140"

# Pi-hole specific settings
pihole_dns_1: "1.1.1.1"              # or "208.67.222.222" (OpenDNS)
pihole_dns_2: "1.0.0.1"              # or "208.67.220.220" (OpenDNS)
pihole_listening_mode: "LOCAL"       # LOCAL, ALL, SINGLE, BIND
pihole_blocking_mode: "NULL"         # NULL, IP-NODATA-AAAA, IP, NXDOMAIN, NODATA
pihole_cache_size: 10000
pihole_max_db_days: 91
dns_domain: "lan"                    # or "home.lab"
